version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot_db
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads
      - whatsapp_session:/app/.wwebjs_auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.chatbot-api.rule=Host(`api-chatbot.omeryilmaz.me`)"
      - "traefik.http.routers.chatbot-api.entrypoints=web"
      - "traefik.http.services.chatbot-api.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api-chatbot.omeryilmaz.me
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.chatbot-web.rule=Host(`chatbot.omeryilmaz.me`)"
      - "traefik.http.routers.chatbot-web.entrypoints=web"
      - "traefik.http.services.chatbot-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:
  whatsapp_session:

networks:
  dokploy-network:
    external: true
